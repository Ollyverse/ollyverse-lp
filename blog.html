<script>
(function () {
  'use strict';

  // ── Entry animation
  var cards = document.querySelectorAll('[data-olv-blog-card]');
  cards.forEach(function (card, i) {
    card.style.opacity   = '0';
    card.style.transform = 'translateY(20px)';
    card.style.transition = 'opacity 0.4s ease, transform 0.4s ease, border-color 0.25s ease';
    setTimeout(function () {
      card.style.opacity   = '1';
      card.style.transform = 'translateY(0)';
    }, 80 + i * 80);
  });

  // ── Category filter
  var filterBtns = document.querySelectorAll('[data-olv-blog-filter]');
  var emptyState = document.getElementById('olvBlogEmpty');

  filterBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {

      filterBtns.forEach(function (b) {
        b.style.background  = 'transparent';
        b.style.color       = '#888';
        b.style.borderColor = '#1e1e1e';
      });
      btn.style.background  = '#5ae0c8';
      btn.style.color       = '#060606';
      btn.style.borderColor = '#5ae0c8';

      var active  = btn.getAttribute('data-olv-blog-filter');
      var visible = 0;

      cards.forEach(function (card) {
        var cat  = card.getAttribute('data-olv-blog-category');
        var show = (active === 'all' || cat === active);

        if (show) {
          card.style.display = 'flex';
          visible++;
          setTimeout(function () {
            card.style.opacity   = '1';
            card.style.transform = 'translateY(0)';
          }, 20);
        } else {
          card.style.opacity   = '0';
          card.style.transform = 'translateY(10px)';
          setTimeout(function () {
            card.style.display = 'none';
          }, 300);
        }
      });

      // Show/hide empty state
      if (emptyState) {
        setTimeout(function () {
          emptyState.style.display = visible === 0 ? 'block' : 'none';
        }, 320);
      }
    });
  });

  // ── Newsletter subscribe UX
  var subBtn      = document.getElementById('olvBlogSubscribeBtn');
  var emailInput  = document.getElementById('olvBlogEmailInput');
  var subFeedback = document.getElementById('olvBlogSubFeedback');

  if (subBtn && emailInput && subFeedback) {
    subBtn.addEventListener('click', function () {
      var email = emailInput.value.trim();
      var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

      if (!valid) {
        subFeedback.style.color = '#e05a5a';
        subFeedback.textContent = 'Please enter a valid email address.';
        emailInput.style.borderColor = 'rgba(224,90,90,0.4)';
        return;
      }

      // ── Replace with your actual form submission / API call ──
      subBtn.textContent      = 'Subscribed ✓';
      subBtn.style.background = 'rgba(90,224,200,0.15)';
      subBtn.style.color      = '#5ae0c8';
      subBtn.style.border     = '1px solid rgba(90,224,200,0.2)';
      subBtn.disabled         = true;
      emailInput.disabled     = true;
      emailInput.style.opacity = '0.4';

      subFeedback.style.color = '#5ae0c8';
      subFeedback.textContent = 'You\'re on the list. Expect great reads soon.';
    });

    emailInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') subBtn.click();
    });
  }

})();
</script>
