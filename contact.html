<div id="contactFormContainer"
  style="
    max-width: 400px;
    margin: 50px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  ">
  <h2 style="text-align: center; margin-bottom: 20px;">Reach out to us</h2>

  <form
    id="contactForm"
    onsubmit="sendEmail(event)"
    style="display: flex; flex-direction: column; gap: 15px;"
  >
    <div>
      <label for="name" style="display: block; margin-bottom: 5px;">Your Name</label>
      <input
        type="text"
        id="name"
        required
        placeholder="Enter your name"
        style="
          width: 100%;
          padding: 10px;
          border-radius: 10px;
          border: none;
          outline: none;
          background: rgba(255, 255, 255, 0.25);
          color: #fff;
        "
      />
    </div>

    <div>
      <label for="email" style="display: block; margin-bottom: 5px;">Your Email</label>
      <input
        type="email"
        id="email"
        required
        placeholder="Enter your email"
        style="
          width: 100%;
          padding: 10px;
          border-radius: 10px;
          border: none;
          outline: none;
          background: rgba(255, 255, 255, 0.25);
          color: #fff;
        "
      />
    </div>

    <div>
      <label for="message" style="display: block; margin-bottom: 5px;">Message</label>
      <textarea
        id="message"
        rows="4"
        required
        placeholder="Type your message..."
        style="
          width: 100%;
          padding: 10px;
          border-radius: 10px;
          border: none;
          outline: none;
          background: rgba(255, 255, 255, 0.25);
          color: #fff;
          resize: none;
        "
      ></textarea>
    </div>

    <button
      type="submit"
      style="
        background: rgba(0, 123, 255, 0.8);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s ease, transform 0.3s ease;
      "
      onmouseover="this.style.background='rgba(0,123,255,1)'; this.style.transform='scale(1.05)'"
      onmouseout="this.style.background='rgba(0,123,255,0.8)'; this.style.transform='scale(1)'"
    >
      Send Message
    </button>
  </form>
</div>

  <script>   // Update Copyright Year
        document.getElementById('currentYear').textContent = new Date().getFullYear();
        
        
 function sendEmail(event) {
    event.preventDefault(); // Prevent normal form submission

    // Get form values
    const name = encodeURIComponent(document.getElementById("name").value);
    const email = encodeURIComponent(document.getElementById("email").value);
    const message = encodeURIComponent(document.getElementById("message").value);

    // Construct the email subject and body
    const subject = encodeURIComponent(`New message from ${name}`);
    const body = encodeURIComponent(
      `Name: ${decodeURIComponent(name)}\nEmail: ${decodeURIComponent(email)}\n\nMessage:\n${decodeURIComponent(message)}`
    );

    // Mailto link
    const mailtoLink = `mailto:officialollyverse@outlook.com?subject=${subject}&body=${body}`;

    // Open the user's email client
    window.location.href = mailtoLink;
  }
        
        
        
        </script>
