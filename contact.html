<script>function sendEmail(event) {
    event.preventDefault(); // Prevent normal form submission

    // Get form values
    const name = encodeURIComponent(document.getElementById("name").value);
    const email = encodeURIComponent(document.getElementById("email").value);
    const message = encodeURIComponent(document.getElementById("message").value);

    // Construct the email subject and body
    const subject = encodeURIComponent(`New message from ${name}`);
    const body = encodeURIComponent(
      `Name: ${decodeURIComponent(name)}\nEmail: ${decodeURIComponent(email)}\n\nMessage:\n${decodeURIComponent(message)}`
    );

    // Mailto link
    const mailtoLink = `mailto:officialollyverse@outlook.com?subject=${subject}&body=${body}`;

    // Open the user's email client
    window.location.href = mailtoLink;
  }</script>
    <script>


            // Add icon dynamically to parent
            const icon = document.createElement('i');
            icon.className = 'fas';
            
            if (input.type === 'text' && input.id === 'name') {
                icon.classList.add('fa-user');
            } else if (input.type === 'email') {
                icon.classList.add('fa-envelope');
            } else if (input.id === 'subject') {
                icon.classList.add('fa-tag');
            } else if (input.tagName === 'TEXTAREA') {
                icon.classList.add('fa-comment');
            }
            
            const iconContainer = document.createElement('div');
            iconContainer.className = 'input-icon';
            iconContainer.appendChild(icon);
            input.parentNode.appendChild(iconContainer);
            
            // Add focus/blur effects
            input.addEventListener('focus', function() {
                this.parentNode.querySelector('.input-icon i').style.color = '#86a8e7';
            });
            
            input.addEventListener('blur', function() {
                this.parentNode.querySelector('.input-icon i').style.color = 'rgba(255, 255, 255, 0.5)';
            });
        });
        
        // Add a subtle typing animation to the tagline
        const tagline = document.querySelector('.tagline');
        const originalText = tagline.textContent;
        tagline.textContent = '';
        
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < originalText.length) {
                tagline.textContent += originalText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 50);
            }
        }
        
        // Start the typing animation after a brief delay
        setTimeout(typeWriter, 1000);
    </script>
